kind: pipeline
type: docker
name: default

clone:
  depth: 50

steps:
  - name: package
    image: debian:9
    commands:
      - apt-get -qq update
      - apt-get install -y -qq devscripts dh-make fakeroot debian-archive-keyring ca-certificates wget gnupg2 git equivs openssh-client reprepro

      - echo $GPG | base64 -d > ../gpg.key
      - echo $SSH | base64 -d > ../id_rsa
      - chmod 600 ../id_rsa ../gpg.key
      - unset GPG
      - unset SSH

      - gpg --import ../gpg.key
      - gpg --list-secret-keys

      - echo "deb http://debian.koha-community.org/koha stable main" > /etc/apt/sources.list.d/koha.list
      - wget -O- https://debian.koha-community.org/koha/gpg.asc | apt-key add -
      - apt-get -qq update
      - yes|mk-build-deps -i
      - git clean -f
      - git config --global user.name "Builder"
      - git config --global user.email "nobody@example.com"
      - EPOCH=`date +%s`
      - GITCOMMIT=`git rev-parse --short HEAD`

      # for now we have solution to set up ours "max"-ed version to always come
      # in "concat(1, KCver)" style over that which comes from community:
      - >
          COMMUNITY_VERSION="$(apt-cache madison koha-common | awk -F' \\| ' '{print $2}')";
          [ -z "$COMMUNITY_VERSION" ] && { echo "can't detect koha-common version"; exit 1; };
          OUR_VERSION="1$COMMUNITY_VERSION"

      - dch --force-distribution -D "stretch" "Git build" -v "$OUR_VERSION~$EPOCH-git$GITCOMMIT-1"

      - >
          (
            echo -n "$DRONE_REPO $DRONE_BRANCH, ";
            TZ=":Europe/Helsinki" date -d @$EPOCH +'%Y-%m-%d %H:%M:%S %Z';
            echo "Build $DRONE_BUILD_NUMBER version $OUR_VERSION based on community version $COMMUNITY_VERSION";
            echo "last commit by $DRONE_COMMIT_AUTHOR ($DRONE_COMMIT_AUTHOR_NAME <$DRONE_COMMIT_AUTHOR_EMAIL>)";
            echo "";
            echo "$DRONE_REPO special (kk-* and bug-*) branches merged:";
          ) > debian/kk-build.txt

      - >
          git log --merges --after="2020-06-22T00:00:00" --pretty=format:"  %h %s" |
          sed -n -E -e "s~Merge remote-tracking branch '(remotes/)?(origin/)?(.+)' into preproduction~\\\\3~p"
          1>> debian/kk-build.txt

      - echo "debian/kk-build.txt                     usr/share/koha/intranet/htdocs"
          1>> debian/koha-common.install

      - git add debian/changelog
      - git add debian/kk-build.txt
      - git add debian/koha-common.install

      - git commit -m "Modified changelog for build"
      - git archive --format=tar HEAD | gzip > "../koha_$OUR_VERSION~$EPOCH-git$GITCOMMIT.orig.tar.gz"
      - DEB_BUILD_OPTIONS=nocheck dpkg-buildpackage -ktestkey

      - mkdir -p ../repos/conf
      - cp .reprepro ../repos/conf/distributions
      - cd ../repos
      - reprepro includedeb stable ../*.deb
      - cd ../repos
      - echo "cd koha" >> ../sftp-cmds
#      - echo 'mkdir conf' >> ../sftp-cmds
#      - echo 'mkdir db' >> ../sftp-cmds
#      - echo 'mkdir dists' >> ../sftp-cmds
#      - echo 'mkdir pool' >> ../sftp-cmds
      - echo 'put -r *' >> ../sftp-cmds

      - sftp -i ../id_rsa -o StrictHostKeyChecking=no -b ../sftp-cmds $SFTPUSER@repo.lib.helsinki.fi # host key checking should not be needed, worst case: packages are not uploaded.
    environment:
      GPG:
        from_secret: GPGKEY
      SSH:
        from_secret: SSHKEY
      SFTPUSER:
        from_secret: username
    when:
      branch:
        - preproduction

---
kind: secret
name: GPGKEY
data: 
---
kind: secret
name: SSHKEY
data: 
---
kind: secret
name: username
data: G83SgQUz+ksSIlxStpOplyiHI6DH9qsCxZw+jpj4uh5C7rIZJQ==
